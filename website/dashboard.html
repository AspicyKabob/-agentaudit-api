<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AgentAudit</title>
  <meta name="description" content="AgentAudit Dashboard — manage agents, compliance rules, audit logs, and billing.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://agentaudit-api-production.up.railway.app/dashboard.html">
  <meta property="og:title" content="Dashboard — AgentAudit">
  <meta property="og:description" content="Manage agents, compliance rules, audit logs, and billing.">
  <meta property="og:image" content="https://agentaudit-api-production.up.railway.app/docs/assets/landing-hero.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dashboard — AgentAudit">
  <meta name="twitter:description" content="Manage agents, compliance rules, audit logs, and billing.">
  <meta name="twitter:image" content="https://agentaudit-api-production.up.railway.app/docs/assets/landing-hero.png">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛡️%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard { padding: 100px 0 40px; }
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .dashboard-header h1 { font-size: 32px; font-weight: 700; }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .stat-card h3 {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }
    .panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .panel-header h2 { font-size: 18px; font-weight: 600; }
    .api-key-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .api-key-row:last-child { border: none; }
    .api-key-info { display: flex; flex-direction: column; gap: 2px; }
    .api-key-name { font-weight: 500; font-size: 14px; }
    .api-key-meta { font-size: 12px; color: var(--text-muted); }
    .api-key-value {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--bg);
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .log-row {
      display: grid;
      grid-template-columns: 180px 1fr 120px 100px;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      align-items: center;
    }
    .log-row:last-child { border: none; }
    .log-time { color: var(--text-muted); font-family: var(--font-mono); }
    .log-action { color: var(--text); }
    .log-agent { color: var(--text-secondary); }
    .log-status { text-align: right; }
    .status-clean { color: var(--success); }
    .status-flag { color: #f59e0b; }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }
    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
      .log-row { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-glass">
      <div class="container nav-inner">
        <a href="/" class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#logoGrad)"/><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs></svg>
          </div>
          <span class="logo-text">AgentAudit</span>
        </a>
        <div class="nav-links">
          <a href="/" class="nav-link">Home</a>
          <a href="/docs" class="nav-link">Docs</a>
        </div>
        <div class="nav-auth" id="nav-auth"></div>
      </div>
    </div>
  </nav>

  <div class="container dashboard">
    <div class="dashboard-header">
      <h1>Dashboard</h1>
      <span class="nav-user-email" id="org-email"></span>
    </div>

    <div class="dashboard-grid">
      <div class="stat-card">
        <h3>Total Audit Logs</h3>
        <div class="value" id="stat-logs">—</div>
      </div>
      <div class="stat-card">
        <h3>Agents</h3>
        <div class="value" id="stat-agents">—</div>
      </div>
      <div class="stat-card">
        <h3>API Calls (Month)</h3>
        <div class="value" id="stat-api">—</div>
      </div>
      <div class="stat-card">
        <h3>Plan</h3>
        <div class="value" id="stat-plan">—</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>API Keys</h2>
        <button class="btn btn-primary btn-sm" id="btn-create-key">+ New Key</button>
      </div>
      <div id="api-keys-list"><div class="empty-state">Loading...</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>Recent Audit Logs</h2>
        <a href="/docs" class="btn btn-glass btn-sm">View All</a>
      </div>
      <div id="audit-logs-list"><div class="empty-state">Loading...</div></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8080' : 'https://agentaudit-api-production.up.railway.app';
    function api(path) { return `${API_BASE}${path}`; }
    function getToken() { return localStorage.getItem('aa_token'); }
    if (!getToken()) { window.location.href = '/'; }

    async function apiCall(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(api(path), opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function showToast(message, type = 'info') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
    }

    async function loadDashboard() {
      try {
        const me = await apiCall('GET', '/api/v1/auth/me');
        document.getElementById('org-email').textContent = me.email;
        document.getElementById('stat-plan').textContent = me.plan.charAt(0).toUpperCase() + me.plan.slice(1);
        document.getElementById('stat-api').textContent = me.apiUsed.toLocaleString();
      } catch (err) {
        if (err.message.includes('401')) { clearToken(); window.location.href = '/'; }
      }

      try {
        const agents = await apiCall('GET', '/api/v1/agents');
        document.getElementById('stat-agents').textContent = Array.isArray(agents) ? agents.length : '0';
      } catch { document.getElementById('stat-agents').textContent = '0'; }

      try {
        const logs = await apiCall('GET', '/api/v1/audit-logs?limit=5');
        const list = document.getElementById('audit-logs-list');
        if (logs.data && logs.data.length) {
          document.getElementById('stat-logs').textContent = logs.pagination?.total?.toLocaleString() || logs.data.length;
          list.innerHTML = logs.data.map(l => `
            <div class="log-row">
              <span class="log-time">${new Date(l.createdAt).toLocaleString()}</span>
              <span class="log-action">${l.action}</span>
              <span class="log-agent">${l.agentId ? l.agentId.slice(0, 8) : '—'}</span>
              <span class="log-status ${l.complianceFlags?.length ? 'status-flag' : 'status-clean'}">${l.complianceFlags?.length ? '⚠ Flagged' : '✓ Clean'}</span>
            </div>`).join('');
        } else {
          list.innerHTML = '<div class="empty-state">No audit logs yet. Integrate the SDK to start logging.</div>';
          document.getElementById('stat-logs').textContent = '0';
        }
      } catch {
        document.getElementById('audit-logs-list').innerHTML = '<div class="empty-state">Unable to load logs.</div>';
      }

      try {
        const keys = await apiCall('GET', '/api/v1/auth/api-keys');
        const list = document.getElementById('api-keys-list');
        if (keys.length) {
          list.innerHTML = keys.map(k => `
            <div class="api-key-row" data-id="${k.id}">
              <div class="api-key-info">
                <span class="api-key-name">${k.name}</span>
                <span class="api-key-meta">Created ${new Date(k.createdAt).toLocaleDateString()}</span>
              </div>
              <button class="btn btn-secondary btn-sm" onclick="revokeKey('${k.id}')">Revoke</button>
            </div>`).join('');
        } else {
          list.innerHTML = '<div class="empty-state">No API keys. Create one to integrate your agents.</div>';
        }
      } catch {
        document.getElementById('api-keys-list').innerHTML = '<div class="empty-state">Unable to load keys.</div>';
      }
    }

    document.getElementById('btn-create-key')?.addEventListener('click', async () => {
      const name = prompt('Name for this API key:');
      if (!name) return;
      try {
        const data = await apiCall('POST', '/api/v1/auth/api-keys', { name });
        showToast(`Key created! Copy it now: ${data.key}`, 'success');
        loadDashboard();
      } catch (err) { showToast(err.message, 'error'); }
    });

    async function revokeKey(id) {
      if (!confirm('Revoke this API key? Any agents using it will stop working.')) return;
      try {
        await apiCall('DELETE', `/api/v1/auth/api-keys/${id}`);
        showToast('Key revoked', 'info');
        loadDashboard();
      } catch (err) { showToast(err.message, 'error'); }
    }

    window.revokeKey = revokeKey;

    const navAuth = document.getElementById('nav-auth');
    if (navAuth) {
      navAuth.innerHTML = `
        <a href="/dashboard.html" class="btn btn-glass btn-sm">Dashboard</a>
        <button class="btn btn-secondary btn-sm" id="nav-logout">Log Out</button>
      `;
      document.getElementById('nav-logout')?.addEventListener('click', () => {
        localStorage.removeItem('aa_token');
        window.location.href = '/';
      });
    }

    loadDashboard();
  </script>
</body>
</html>
