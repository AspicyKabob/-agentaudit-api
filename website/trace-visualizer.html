<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentAudit — Trace Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0c;
      --bg-elevated: #141414;
      --bg-card: #1a1a1a;
      --text: #fafaf9;
      --text-secondary: #a8a29e;
      --text-muted: #78716c;
      --border: rgba(250, 250, 249, 0.08);
      --border-strong: rgba(250, 250, 249, 0.15);
      --accent: #dc2626;
      --accent-warm: #ea580c;
      --success: #16a34a;
      --warning: #ca8a04;
      --error: #dc2626;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: linear-gradient(rgba(250, 250, 249, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(250, 250, 249, 0.015) 1px, transparent 1px);
      background-size: 100px 100px;
    }
    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(12, 12, 12, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
      font-family: var(--font-sans);
    }
    .logo-text .logo-a {
      color: var(--accent);
      font-family: var(--font-serif);
      font-style: italic;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      font-family: var(--font-sans);
    }
    .nav-link:hover { color: var(--text); }
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px;
      position: relative;
      z-index: 2;
    }
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .btn {
      padding: 12px 24px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }
    .btn:hover { background: #b91c1c; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .stats-bar span { display: flex; align-items: center; gap: 6px; }
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .trace-tree {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      min-height: 400px;
    }
    .tree-level {
      position: relative;
    }
    .tree-connector {
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .trace-node {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .trace-node:last-child { margin-bottom: 0; }
    .node-indent {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .node-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      z-index: 1;
    }
    .node-icon.crew { background: rgba(220, 38, 38, 0.15); color: var(--accent); }
    .node-icon.task { background: rgba(234, 88, 12, 0.15); color: var(--accent-warm); }
    .node-icon.action { background: rgba(22, 163, 74, 0.15); color: var(--success); }
    .node-icon.blocked { background: rgba(220, 38, 38, 0.2); color: var(--error); }
    .node-content {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .node-content.blocked {
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.05);
    }
    .node-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .node-title {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .node-time {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .node-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .node-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .node-preview {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(148, 163, 184, 0.05);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
    }
    .node-preview-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .flag-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
      margin-right: 4px;
    }
    .flag-badge.critical { background: rgba(239, 68, 68, 0.15); color: var(--error); }
    .flag-badge.warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-text"><span class="logo-a">A</span>gentAudit</span>
      </a>
      <div class="nav-links">
        <a href="index.html#features" class="nav-link">Features</a>
        <a href="index.html#demo" class="nav-link">Demo</a>
        <a href="index.html#pricing" class="nav-link">Pricing</a>
        <a href="trace-visualizer.html" class="nav-link">Trace Visualizer</a>
        <a href="https://github.com/AspicyKabob/-agentaudit-api" target="_blank" class="nav-link">GitHub</a>
      </div>
      <div style="color: var(--text-muted); font-size: 14px; font-family: var(--font-sans);">Trace Visualizer</div>
    </div>
  </header>

  <main class="main">
    <div class="search-bar">
      <input type="text" class="search-input" id="trace-input" placeholder="Enter trace ID (e.g., trace-abc-123)" />
      <button class="btn" id="load-trace">Load Trace</button>
    </div>

    <div class="stats-bar" id="stats-bar" style="display:none">
      <span><strong id="stat-count">0</strong> logs</span>
      <span><strong id="stat-duration">0s</strong> duration</span>
      <span style="color: var(--error); display:none" id="stat-flags"><strong id="stat-flags-count">0</strong> violations</span>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background: var(--accent)"></div> Crew</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--accent)"></div> Task</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--success)"></div> Action</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--error)"></div> Violation</div>
    </div>

    <div class="trace-tree" id="trace-tree">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <p>Enter a trace ID above to visualize the agent chain</p>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8080'
      : 'https://agentaudit-api-production.up.railway.app';

    function getToken() { return localStorage.getItem('aa_token'); }

    document.getElementById('load-trace').addEventListener('click', async () => {
      const traceId = document.getElementById('trace-input').value.trim();
      if (!traceId) return alert('Enter a trace ID');

      const token = getToken();
      if (!token) return alert('Please log in first');

      const btn = document.getElementById('load-trace');
      btn.disabled = true;
      btn.textContent = 'Loading...';

      try {
        const res = await fetch(`${API_BASE}/api/v1/audit-logs/trace/${encodeURIComponent(traceId)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load trace');

        renderTrace(data.data || []);
      } catch (err) {
        document.getElementById('trace-tree').innerHTML = `
          <div class="empty-state" style="color: var(--error)">
            <p>Error: ${err.message}</p>
          </div>`;
        document.getElementById('stats-bar').style.display = 'none';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Load Trace';
      }
    });

    function buildTree(logs) {
      const map = new Map();
      logs.forEach(log => map.set(log.id, { ...log, children: [] }));
      const roots = [];
      logs.forEach(log => {
        const node = map.get(log.id);
        if (log.parentSpanId && map.has(log.parentSpanId)) {
          map.get(log.parentSpanId).children.push(node);
        } else {
          roots.push(node);
        }
      });
      // Sort by createdAt
      const sortFn = (a, b) => new Date(a.createdAt) - new Date(b.createdAt);
      roots.sort(sortFn);
      const sortChildren = (node) => {
        node.children.sort(sortFn);
        node.children.forEach(sortChildren);
      };
      roots.forEach(sortChildren);
      return roots;
    }

    function renderTrace(logs) {
      if (!logs.length) {
        document.getElementById('trace-tree').innerHTML = `
          <div class="empty-state">
            <p>No logs found for this trace ID</p>
          </div>`;
        document.getElementById('stats-bar').style.display = 'none';
        return;
      }

      // Stats
      const times = logs.map(l => new Date(l.createdAt).getTime()).sort((a, b) => a - b);
      const duration = ((times[times.length - 1] - times[0]) / 1000).toFixed(1);
      const flagsCount = logs.reduce((sum, l) => sum + (l.complianceFlags?.length || 0), 0);
      document.getElementById('stat-count').textContent = logs.length;
      document.getElementById('stat-duration').textContent = duration + 's';
      document.getElementById('stat-flags-count').textContent = flagsCount;
      document.getElementById('stat-flags').style.display = flagsCount > 0 ? 'flex' : 'none';
      document.getElementById('stats-bar').style.display = 'flex';

      const tree = buildTree(logs);
      document.getElementById('trace-tree').innerHTML = renderNodes(tree, 0);
    }

    function renderNodes(nodes, depth) {
      return nodes.map(node => {
        const hasFlags = (node.complianceFlags || []).length > 0;
        const iconClass = hasFlags ? 'blocked' :
                          node.action.includes('crew') ? 'crew' :
                          node.action.includes('task') ? 'task' : 'action';
        const icon = node.action.includes('crew') ? 'C' :
                     node.action.includes('task') ? 'T' : 'A';

        const flags = (node.complianceFlags || []).map(f => {
          const severity = f.includes('CRITICAL') ? 'critical' : 'warning';
          return `<span class="flag-badge ${severity}">${f}</span>`;
        }).join('');

        const time = new Date(node.createdAt);
        const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        // Preview: response if available, else prompt
        let preview = '';
        if (node.response) {
          preview = `<div class="node-preview-label">Response</div><div class="node-preview">${escapeHtml(node.response.slice(0, 200))}${node.response.length > 200 ? '...' : ''}</div>`;
        } else if (node.prompt) {
          preview = `<div class="node-preview-label">Prompt</div><div class="node-preview">${escapeHtml(node.prompt.slice(0, 200))}${node.prompt.length > 200 ? '...' : ''}</div>`;
        }

        const meta = [];
        if (node.metadata?.crew) meta.push(`Crew: ${node.metadata.crew}`);
        if (node.metadata?.agent_role) meta.push(`Role: ${node.metadata.agent_role}`);
        if (node.metadata?.task_id) meta.push(`Task: ${node.metadata.task_id}`);

        const childrenHtml = node.children.length ? renderNodes(node.children, depth + 1) : '';

        const indentStyle = depth > 0 ? `margin-left: ${depth * 40}px;` : '';

        return `
          <div class="trace-node" style="${indentStyle}">
            <div class="node-icon ${iconClass}">${icon}</div>
            <div class="node-content ${hasFlags ? 'blocked' : ''}">
              <div class="node-header">
                <span class="node-title">${node.action}${hasFlags ? ' <span style="color:var(--error)">●</span>' : ''}</span>
                <span class="node-time">${timeStr}</span>
              </div>
              <div class="node-meta">
                ${meta.map(m => `<span>${m}</span>`).join('')}
              </div>
              ${preview}
              ${flags}
            </div>
          </div>
          ${childrenHtml}`;
      }).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
