<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentAudit — Trace Visualizer</title>
  <meta name="description" content="Visualize multi-agent audit trails with distributed trace IDs. Track CrewAI, LangChain, and custom agent workflows.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://agentaudit-api-production.up.railway.app/trace-visualizer.html">
  <meta property="og:title" content="Trace Visualizer — AgentAudit">
  <meta property="og:description" content="Visualize multi-agent audit trails with distributed trace IDs.">
  <meta property="og:image" content="https://agentaudit-api-production.up.railway.app/docs/assets/landing-hero.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Trace Visualizer — AgentAudit">
  <meta name="twitter:description" content="Visualize multi-agent audit trails with distributed trace IDs.">
  <meta name="twitter:image" content="https://agentaudit-api-production.up.railway.app/docs/assets/landing-hero.png">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%230c0c0c'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-family='Georgia,serif' font-size='60' font-weight='bold' font-style='italic' fill='%23dc2626'%3EA%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0c;
      --bg-elevated: #141414;
      --bg-card: #1a1a1a;
      --text: #fafaf9;
      --text-secondary: #a8a29e;
      --text-muted: #78716c;
      --border: rgba(250, 250, 249, 0.08);
      --border-strong: rgba(250, 250, 249, 0.15);
      --accent: #dc2626;
      --accent-warm: #ea580c;
      --success: #16a34a;
      --warning: #ca8a04;
      --error: #dc2626;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: linear-gradient(rgba(250, 250, 249, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(250, 250, 249, 0.015) 1px, transparent 1px);
      background-size: 100px 100px;
    }
    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(12, 12, 12, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0;
      font-weight: 800;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
      font-family: var(--font-sans);
    }
    .logo-text {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text);
      text-transform: lowercase;
    }
    .logo-text .logo-a {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 500;
      line-height: 1;
      color: var(--accent);
      display: inline-block;
      vertical-align: baseline;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      font-family: var(--font-sans);
    }
    .nav-link:hover { color: var(--text); }
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px;
      position: relative;
      z-index: 2;
    }
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .btn {
      padding: 12px 24px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }
    .btn:hover { background: #b91c1c; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .stats-bar span { display: flex; align-items: center; gap: 6px; }
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .trace-tree {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      min-height: 400px;
    }
    .tree-level {
      position: relative;
    }
    .tree-connector {
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .trace-node {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .trace-node:last-child { margin-bottom: 0; }
    .node-indent {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .node-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      z-index: 1;
    }
    .node-icon.crew { background: rgba(220, 38, 38, 0.15); color: var(--accent); }
    .node-icon.task { background: rgba(234, 88, 12, 0.15); color: var(--accent-warm); }
    .node-icon.action { background: rgba(22, 163, 74, 0.15); color: var(--success); }
    .node-icon.blocked { background: rgba(220, 38, 38, 0.2); color: var(--error); }
    .node-content {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .node-content.blocked {
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.05);
    }
    .node-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .node-title {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .node-time {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .node-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .node-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .node-preview {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(148, 163, 184, 0.05);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
    }
    .node-preview-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .flag-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
      margin-right: 4px;
    }
    .flag-badge.critical { background: rgba(239, 68, 68, 0.15); color: var(--error); }
    .flag-badge.warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-text"><span class="logo-a">A</span>gentAudit</span>
      </a>
      <div class="nav-links">
        <a href="index.html#features" class="nav-link">Features</a>
        <a href="index.html#demo" class="nav-link">Demo</a>
        <a href="index.html#pricing" class="nav-link">Pricing</a>
        <a href="trace-visualizer.html" class="nav-link">Trace Visualizer</a>
        <a href="https://github.com/AspicyKabob/-agentaudit-api" target="_blank" class="nav-link">GitHub</a>
      </div>
      <div style="color: var(--text-muted); font-size: 14px; font-family: var(--font-sans);">Trace Visualizer</div>
    </div>
  </header>

  <main class="main">
    <div class="search-bar">
      <input type="text" class="search-input" id="trace-input" placeholder="Enter trace ID (e.g., trace-abc-123)" />
      <button class="btn" id="load-trace">Load Trace</button>
    </div>

    <div class="stats-bar" id="stats-bar" style="display:none">
      <span><strong id="stat-count">0</strong> logs</span>
      <span><strong id="stat-duration">0s</strong> duration</span>
      <span style="color: var(--error); display:none" id="stat-flags"><strong id="stat-flags-count">0</strong> violations</span>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background: var(--accent)"></div> Crew</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--accent)"></div> Task</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--success)"></div> Action</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--error)"></div> Violation</div>
    </div>

    <div class="trace-tree" id="trace-tree">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <p>Enter a trace ID above to visualize the agent chain</p>
      </div>
    </div>
  </main>

  <script src="trace-visualizer.js"></script>
</body>
</html>
