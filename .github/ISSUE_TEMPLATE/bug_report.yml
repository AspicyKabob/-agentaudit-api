name: Bug report
description: Report a reproducible AgentAudit defect that is safe to discuss publicly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AgentAudit. Do not include API keys, tokens, customer data, or vulnerability details. Security issues must follow SECURITY.md.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Web dashboard or landing site
        - Python SDK
        - TypeScript SDK
        - Deployment or documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.1.0-trace or commit SHA
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use synthetic data and redact all credentials.
      placeholder: |
        1. Configure...
        2. Call...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Hosted or self-hosted, operating system, Node/Python version, browser
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted logs
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, API keys, tokens, and customer data.
          required: true
        - label: This is not a security vulnerability; security reports follow SECURITY.md.
          required: true
