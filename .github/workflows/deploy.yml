name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  # Re-run all CI checks so the deploy job has verified artifacts.
  # Keeps deploy self-contained even if CI workflow is skipped or cached.
  test:
    name: Test API
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test_secret_not_for_production_01234567890123456789
      API_KEY_SALT: test_salt_0123456789abcdef
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install native build tools for isolated-vm
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ linux-headers-generic
      - run: npm ci
      - run: npx prisma generate
      - name: Verify API (lint, build, SDK build, tests)
        run: npm run verify:ci

  test-python-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Python SDK tests
        run: pytest agentaudit/tests -q

  test-typescript-sdk:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, test-python-sdk, test-typescript-sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service="-agentaudit-api"
