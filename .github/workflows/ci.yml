name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test_secret_not_for_production_01234567890123456789
      API_KEY_SALT: test_salt_0123456789abcdef
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install native build tools for isolated-vm
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ linux-headers-generic
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - name: Run tests
        run: npm test -- --runInBand --passWithNoTests --no-coverage --forceExit
