name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentaudit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agentaudit_test
      - name: Run tests
        run: npm test -- --passWithNoTests --no-coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agentaudit_test
          JWT_SECRET: test_secret_not_for_production_01234567890123456789
          API_KEY_SALT: test_salt_0123456789abcdef
          NODE_ENV: test

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install -g @railway/cli
      - run: railway up --service agentaudit-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
